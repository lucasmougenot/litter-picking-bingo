<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="description" content="Track your litter picking finds with a simple bingo card. Mark off items as you go and help keep your community clean!">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Litter Picking Bingo</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <header>
  </header>
  <div class="card-wrapper">
    <div class="bingo-header">
      <div class="bingo-letter">B</div>
      <div class="bingo-letter">I</div>
      <div class="bingo-letter">N</div>
      <div class="bingo-letter">G</div>
      <div class="bingo-letter">O</div>
    </div>
    <div class="bingo-grid" id="grid"></div>
    <div class="win-banner" id="winBanner">🗑️ BIN-GO! 🏆</div>
    <div class="controls">
      <button class="btn-shuffle">New</button>
      <button class="btn-reset">Reset</button>
      <label class="switch">
        <input type="checkbox" id="rarity-switch" checked />
        <span class="track">
          <span class="thumb"></span>
        </span>
        Rarity
      </label>
    </div>
  </div>
  <footer>Click a square to mark it found</footer>
  <script src="bingo.js" type="module"></script>
</body>

</html>
